<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philosophy Flowchart</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --card-hover: #242424;
            --text: #e8e4e0;
            --text-dim: #8a8580;
            --border: #2d2d2d;
            
            --ancient: #8b7355;
            --medieval: #6b4c8a;
            --rationalist: #4a7c8b;
            --empiricist: #7c8b4a;
            --german-idealism: #8b6b4a;
            --marxist: #c44;
            --existentialist: #d4784a;
            --phenomenology: #4a8b7c;
            --frankfurt: #8b4a6b;
            --post-structuralist: #6b4a8b;
            --accelerationist: #2d1f3d;
            --analytic: #4a6b8b;
            --pragmatist: #8b8b4a;
            --critical-rationalist: #5a7c6b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        .header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }
        
        .header p {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.85rem;
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            min-height: 52px;
        }
        
        .legend::-webkit-scrollbar {
            display: none;
        }
        
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        
        .legend-item:active {
            opacity: 0.5;
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .chart-container {
            position: relative;
            width: 100%;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            padding: 1rem 0;
        }
        
        .chart {
            position: relative;
            width: 1400px;
            min-height: 2000px;
            padding: 0 1rem 2rem 60px;
        }
        
        .time-axis {
            position: absolute;
            left: 20px;
            top: 1rem;
            bottom: 2rem;
            width: 1px;
            background: var(--border);
        }
        
        .philosopher {
            position: absolute;
            width: 180px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 1;
        }
        
        .philosopher:active {
            transform: scale(0.98);
            background: var(--card-hover);
        }
        
        .philosopher.hidden {
            display: none;
        }
        
        .philosopher .name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }
        
        .philosopher .dates {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }
        
        .philosopher .school {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
            display: inline-block;
            margin-bottom: 0.5rem;
            background: rgba(255,255,255,0.1);
        }
        
        .philosopher .takes {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--text-dim);
            display: none;
        }
        
        .philosopher.expanded .takes {
            display: block;
        }
        
        .philosopher .takes li {
            margin-left: 1rem;
            margin-bottom: 0.2rem;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            padding: 1rem;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-overlay.active {
            display: block;
        }
        
        .modal {
            max-width: 500px;
            margin: 1rem auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }
        
        .modal .dates {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }
        
        .modal .school {
            font-size: 0.8rem;
            padding: 0.25rem 0.6rem;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
        }
        
        .modal h3 {
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .modal ul {
            list-style: none;
            margin-bottom: 1.5rem;
        }
        
        .modal li {
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.5;
            font-size: 0.9rem;
        }
        
        .modal .influenced {
            color: #7c8b4a;
        }
        
        .modal .influenced-by {
            color: #8b6b4a;
        }
        
        .close-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .close-btn:active {
            background: var(--card-hover);
        }
        
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem;
            z-index: 100;
        }
        
        .mobile-nav button {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
        
        .mobile-nav button.active {
            color: var(--text);
        }
        
        .content-padding {
            height: 80px;
        }
        
        @media (min-width: 768px) {
            .header {
                padding: 2rem 2rem;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .legend {
                padding: 1rem 2rem;
                gap: 1rem;
            }
            
            .legend-item {
                font-size: 0.7rem;
            }
            
            .chart {
                padding: 2rem 2rem 2rem 80px;
            }
            
            .philosopher {
                width: 200px;
            }
            
            .philosopher .name {
                font-size: 1rem;
            }
            
            .philosopher .dates {
                font-size: 0.65rem;
            }
            
            .philosopher .school {
                font-size: 0.75rem;
            }
            
            .modal-overlay {
                padding: 2rem;
            }
            
            .modal {
                max-width: 600px;
                padding: 2rem;
            }
            
            .content-padding {
                display: none;
            }
            
            .mobile-nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gate" style="position:fixed;inset:0;background:#0d0d0d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
        <p style="color:#8a8580;font-family:JetBrains Mono,monospace;font-size:0.8rem;">enter passkey</p>
        <input type="password" id="pw" style="background:#1a1a1a;border:1px solid #2d2d2d;color:#e8e4e0;padding:0.75rem 1rem;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:1rem;width:200px;text-align:center;" onkeydown="if(event.key==='Enter')check()">
        <button onclick="check()" style="background:#242424;border:1px solid #2d2d2d;color:#e8e4e0;padding:0.5rem 1.5rem;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.75rem;cursor:pointer;">unlock</button>
        <p id="err" style="color:#c44;font-family:JetBrains Mono,monospace;font-size:0.7rem;display:none;">wrong</p>
    </div>
    <script>const p='philomel';function check(){document.getElementById('pw').value===p?(document.getElementById('gate').style.display='none',document.getElementById('pw').value=''):(document.getElementById('err').style.display='block',document.getElementById('pw').value='')}</script>
    
    <div class="header">
        <h1>Philosophy Flowchart</h1>
        <p>Y-axis = time, X-axis = overlap. Tap to expand.</p>
    </div>
    
    <div class="legend" id="legend"></div>
    
    <div class="chart-container">
        <div class="chart" id="chart">
            <div class="time-axis"></div>
        </div>
    </div>
    
    <div class="content-padding"></div>
    
    <div class="modal-overlay" id="overlay">
        <div class="modal" id="modal"></div>
    </div>
    
    <div class="mobile-nav">
        <button class="active" onclick="showAll()">All</button>
        <button onclick="showSchool('continental')">Continental</button>
        <button onclick="showSchool('analytic')">Analytic</button>
        <button onclick="showSchool('marxist')">Marxist</button>
    </div>

    <script>
        const philosophers = [
            // Ancient
            { name: "Socrates", dates: "470-399 BC", x: 100, y: 60, school: "ancient", color: "#8b7355",
              takes: ["The unexamined life is not worth living", "Virtue is knowledge", "I know that I know nothing", "Question everything"] },
            { name: "Plato", dates: "428-348 BC", x: 260, y: 100, school: "ancient", color: "#8b7355",
              takes: ["Forms/Ideas as perfect abstractions", "Philosopher-kings in the Republic", "Knowledge is recollection", "Soul has three parts"] },
            { name: "Aristotle", dates: "384-322 BC", x: 420, y: 160, school: "ancient", color: "#8b7355",
              takes: ["Golden mean between extremes", "Hylomorphism: form + matter", "Four causes of existence", "Man is a political animal"] },
            
            // Medieval
            { name: "Augustine", dates: "354-430", x: 160, y: 280, school: "medieval", color: "#6b4c8a",
              takes: ["City of God vs City of Man", "Original sin", "Time is a creation", "Faith seeks understanding"] },
            { name: "Aquinas", dates: "1225-1274", x: 340, y: 340, school: "medieval", color: "#6b4c8a",
              takes: ["Natural theology: reason + faith", "Five Ways to prove God", "Law as ordering to the good", "Being as act and potency"] },
            
            // Early Modern - Rationalists
            { name: "Descartes", dates: "1596-1650", x: 100, y: 480, school: "rationalist", color: "#4a7c8b",
              takes: ["Cogito ergo sum", "Mind-body dualism", "Clear and distinct ideas", "God as guarantee of truth"] },
            { name: "Spinoza", dates: "1632-1677", x: 260, y: 520, school: "rationalist", color: "#4a7c8b",
              takes: ["God = Nature (pantheism)", "Determinism as liberation", "Three kinds of knowledge", "Blessedness is conatus"] },
            { name: "Leibniz", dates: "1646-1716", x: 420, y: 560, school: "rationalist", color: "#4a7c8b",
              takes: ["Monads as fundamental substances", "Best of all possible worlds", "Pre-established harmony", "Identity of indiscernibles"] },
            
            // Early Modern - Empiricists
            { name: "Locke", dates: "1632-1704", x: 580, y: 500, school: "empiricist", color: "#7c8b4a",
              takes: ["Tabula rasa: mind is blank", "Primary vs secondary qualities", "Social contract theory", "Natural rights"] },
            { name: "Hume", dates: "1711-1776", x: 680, y: 580, school: "empiricist", color: "#7c8b4a",
              takes: ["Problem of causation", "Is-ought gap", "Sympathy as moral foundation", "Bundle theory of self"] },
            
            // German Idealism
            { name: "Kant", dates: "1724-1804", x: 480, y: 680, school: "german-idealism", color: "#8b6b4a",
              takes: ["Transcendental idealism", "Categories of understanding", "Synthetic a priori", "Autonomy of practical reason"] },
            { name: "Hegel", dates: "1770-1831", x: 260, y: 760, school: "german-idealism", color: "#8b6b4a",
              takes: ["Dialectic: thesis-antithesis-synthesis", "Absolute spirit unfolding", "Truth is the whole", "History as rational process"] },
            { name: "Schopenhauer", dates: "1788-1860", x: 480, y: 820, school: "german-idealism", color: "#8b6b4a",
              takes: ["World as will and representation", "Pessimism: life is suffering", "Denial of the will", "Compassion as moral basis"] },
            
            // 19th Century
            { name: "Kierkegaard", dates: "1813-1855", x: 100, y: 900, school: "existentialist", color: "#d4784a",
              takes: ["Truth is subjectivity", "Leap of faith", "Angst and despair", "Three stages of life"] },
            { name: "Marx", dates: "1818-1883", x: 260, y: 940, school: "marxist", color: "#c44",
              takes: ["Historical materialism", "Base-superstructure model", "Class struggle as history", "Alienation of labor"] },
            { name: "Nietzsche", dates: "1844-1900", x: 420, y: 980, school: "existentialist", color: "#d4784a",
              takes: ["God is dead", "Will to power", "Übermensch", "Eternal recurrence", "Master-slave morality"] },
            
            // Phenomenology
            { name: "Husserl", dates: "1859-1938", x: 100, y: 1100, school: "phenomenology", color: "#4a8b7c",
              takes: ["Back to the things themselves", "Phenomenological reduction", "Intentionality", "Bracketing the natural attitude"] },
            { name: "Heidegger", dates: "1889-1976", x: 260, y: 1160, school: "phenomenology", color: "#4a8b7c",
              takes: ["Being and Time", "Dasein as Being-in-the-world", "Thrownness and anxiety", "Being-toward-death"] },
            { name: "Merleau-Ponty", dates: "1908-1961", x: 420, y: 1220, school: "phenomenology", color: "#4a8b7c",
              takes: ["Embodied consciousness", "Perception as primary", "Body as subject", "Reversibility"] },
            
            // Existentialism (20th C)
            { name: "Sartre", dates: "1905-1980", x: 580, y: 1180, school: "existentialist", color: "#d4784a",
              takes: ["Existence precedes essence", "Bad faith", "Freedom is absolute", "Hell is other people"] },
            { name: "Camus", dates: "1913-1960", x: 680, y: 1140, school: "existentialist", color: "#d4784a",
              takes: ["The absurd", "Sisyphus is happy", "Revolt against meaninglessness", "Myth of Sisyphus"] },
            
            // Frankfurt School
            { name: "Benjamin", dates: "1892-1940", x: 100, y: 1300, school: "frankfurt", color: "#8b4a6b",
              takes: ["Art in the age of mechanical reproduction", "Aura and authenticity", "Theses on philosophy of history", "Messianic hope"] },
            { name: "Adorno", dates: "1903-1969", x: 260, y: 1340, school: "frankfurt", color: "#8b4a6b",
              takes: ["Negative dialectics", "No positive theory", "Anti-totality", "Minima moralia"] },
            { name: "Horkheimer", dates: "1895-1973", x: 420, y: 1320, school: "frankfurt", color: "#8b4a6b",
              takes: ["Traditional vs critical theory", "Enlightenment as domination", "Dialectic of enlightenment", "Art as negation"] },
            { name: "Marcuse", dates: "1898-1979", x: 580, y: 1360, school: "frankfurt", color: "#8b4a6b",
              takes: ["One-dimensional man", "Repressive desublimation", "Great Refusal", "Technology as control"] },
            { name: "Habermas", dates: "1929-2018", x: 680, y: 1400, school: "frankfurt", color: "#8b4a6b",
              takes: ["Communicative rationality", "Public sphere", "Discourse ethics", "Structural transformation"] },
            
            // Post-structuralism
            { name: "Deleuze", dates: "1925-1995", x: 100, y: 1500, school: "post-structuralist", color: "#6b4a8b",
              takes: ["Rhizomes over trees", "Difference and repetition", "Becomings", "Desire as production"] },
            { name: "Derrida", dates: "1930-2004", x: 260, y: 1540, school: "post-structuralist", color: "#6b4a8b",
              takes: ["Nothing outside the text", "Différance", "Deconstruction", "Logocentrism"] },
            { name: "Foucault", dates: "1926-1984", x: 420, y: 1580, school: "post-structuralist", color: "#6b4a8b",
              takes: ["Power/knowledge relation", "Genealogy of modernity", "Disciplinary societies", "Technologies of the self"] },
            { name: "Lyotard", dates: "1924-1998", x: 580, y: 1560, school: "post-structuralist", color: "#6b4a8b",
              takes: ["Incredulity toward metanarratives", "Postmodern condition", "The differend", "Paralogy"] },
            { name: "Baudrillard", dates: "1929-2007", x: 680, y: 1600, school: "post-structuralist", color: "#6b4a8b",
              takes: ["Simulacra and simulation", "Hyperreality", "The Gulf War didn't happen", "Objectual mediation"] },
            { name: "Levinas", dates: "1906-1995", x: 780, y: 1500, school: "phenomenology", color: "#4a8b7c",
              takes: ["The Other", "Ethics as first philosophy", "The face of the other", "Responsibility before freedom"] },
            
            // Accelerationism
            { name: "Nick Land", dates: "b. 1960", x: 100, y: 1720, school: "accelerationist", color: "#2d1f3d",
              takes: ["Dark Enlightenment", "CCRU: accelerate or die", "Desire as war machine", "Fanged wish"] },
            { name: "Mark Fisher", dates: "1968-2017", x: 260, y: 1760, school: "accelerationist", color: "#2d1f3d",
              takes: ["Capitalist realism", "Hauntology", "Acid communism", "The slow cancellation"] },
            { name: "Shaviro", dates: "b. 1961", x: 420, y: 1740, school: "accelerationist", color: "#2d1f3d",
              takes: ["Connected populism", "Nooscope", "Accelerationism without acceleration", "Punctuated equilibrium"] },
            
            // Analytic
            { name: "Frege", dates: "1848-1925", x: 580, y: 1280, school: "analytic", color: "#4a6b8b",
              takes: ["Sense and reference", "Concept-object distinction", "Logicism: math = logic", "Thought as objective content"] },
            { name: "Russell", dates: "1872-1970", x: 680, y: 1240, school: "analytic", color: "#4a6b8b",
              takes: ["Logical atomism", "Descriptions theory", "Type theory", "Neutral monism"] },
            { name: "Wittgenstein", dates: "1889-1951", x: 780, y: 1160, school: "analytic", color: "#4a6b8b",
              takes: ["Language as picture", "Limits of language", "Family resemblances", "Philosophy as therapy"] },
            { name: "Popper", dates: "1902-1994", x: 880, y: 1320, school: "critical-rationalist", color: "#5a7c6b",
              takes: ["Falsificationism", "Critical rationalism", "Open society", "Three worlds"] },
            
            // Pragmatism
            { name: "James", dates: "1842-1910", x: 880, y: 900, school: "pragmatist", color: "#8b8b4a",
              takes: ["Truth as what works", "Pragmatist theory of meaning", "Varieties of religious experience", "Will to believe"] },
            { name: "Peirce", dates: "1839-1914", x: 960, y: 860, school: "pragmatist", color: "#8b8b4a",
              takes: ["Pragmatic maxim", "Fallibilism", "Community of inquiry", "Abduction"] },
            { name: "Dewey", dates: "1859-1952", x: 920, y: 1000, school: "pragmatist", color: "#8b8b4a",
              takes: ["Instrumentalism", "Experience as transaction", "Democracy as way of life", "Inquiry as problem-solving"] },
        ];
        
        const schools = {
            "ancient": "Ancient Greek",
            "medieval": "Medieval",
            "rationalist": "Rationalism",
            "empiricist": "Empiricism",
            "german-idealism": "German Idealism",
            "existentialist": "Existentialism",
            "marxist": "Marxism",
            "phenomenology": "Phenomenology",
            "frankfurt": "Frankfurt School",
            "post-structuralist": "Post-Structuralism",
            "accelerationist": "Accelerationism",
            "analytic": "Analytic",
            "critical-rationalist": "Critical Rationalism",
            "pragmatist": "Pragmatism"
        };
        
        const continentalSchools = ['ancient', 'medieval', 'rationalist', 'empiricist', 'german-idealism', 'existentialist', 'phenomenology', 'frankfurt', 'post-structuralist', 'accelerationist'];
        
        // Build legend
        const legendEl = document.getElementById('legend');
        const uniqueSchools = [...new Set(philosophers.map(p => p.school))];
        uniqueSchools.forEach(school => {
            const color = philosophers.find(p => p.school === school).color;
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="legend-dot" style="background: ${color}"></div>${schools[school]}`;
            item.onclick = () => toggleSchool(school);
            legendEl.appendChild(item);
        });
        
        // Build chart
        const chartEl = document.getElementById('chart');
        const activeSchools = new Set(uniqueSchools);
        
        philosophers.forEach((p, i) => {
            const el = document.createElement('div');
            el.className = 'philosopher';
            el.style.left = p.x + 'px';
            el.style.top = p.y + 'px';
            el.style.borderColor = p.color;
            el.innerHTML = `
                <div class="name">${p.name}</div>
                <div class="dates">${p.dates}</div>
                <div class="school" style="background: ${p.color}20; color: ${p.color}">${schools[p.school]}</div>
                <ul class="takes">${p.takes.map(t => `<li>${t}</li>`).join('')}</ul>
            `;
            el.onclick = () => {
                el.classList.toggle('expanded');
                showModal(p);
            };
            chartEl.appendChild(el);
        });
        
        function toggleSchool(school) {
            if (activeSchools.has(school)) {
                activeSchools.delete(school);
            } else {
                activeSchools.add(school);
            }
            filterPhilosophers();
        }
        
        function filterPhilosophers() {
            document.querySelectorAll('.philosopher').forEach(el => {
                const name = el.querySelector('.name').textContent;
                const p = philosophers.find(ph => ph.name === name);
                el.classList.toggle('hidden', !activeSchools.has(p.school));
            });
        }
        
        function showAll() {
            uniqueSchools.forEach(s => activeSchools.add(s));
            filterPhilosophers();
        }
        
        function showSchool(type) {
            activeSchools.clear();
            if (type === 'continental') {
                continentalSchools.forEach(s => activeSchools.add(s));
            } else if (type === 'analytic') {
                activeSchools.add('analytic');
                activeSchools.add('critical-rationalist');
            } else if (type === 'marxist') {
                activeSchools.add('marxist');
                activeSchools.add('frankfurt');
                activeSchools.add('accelerationist');
            }
            filterPhilosophers();
        }
        
        function showModal(p) {
            const overlay = document.getElementById('overlay');
            const modal = document.getElementById('modal');
            
            modal.innerHTML = `
                <h2>${p.name}</h2>
                <div class="dates">${p.dates}</div>
                <div class="school" style="background: ${p.color}30; color: ${p.color}">${schools[p.school]}</div>
                
                <h3>Key Takes</h3>
                <ul>${p.takes.map(t => `<li>${t}</li>`).join('')}</ul>
                
                <button class="close-btn" onclick="closeModal()">Close</button>
            `;
            overlay.classList.add('active');
            overlay.onclick = (e) => {
                if (e.target === overlay) closeModal();
            };
        }
        
        function closeModal() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.philosopher').forEach(el => el.classList.remove('expanded'));
        }
    </script>
</body>
</html>
